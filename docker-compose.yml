version: "3.9"
services:
  app:
    build:
      context: .
      dockerfile: backend.dockerfile
    container_name: pym_node
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    networks:
      - pym
    environment:
      - TZ=America/La_Paz
      - DB_USER=pym_user
      - DB_HOST=postgres
      - DB_PASSWORD=fzZf9DdAZi
      - DB_NAME=db_pymsystems
      - DB_PORT=5432
      - NODE_ENV=production
    volumes:
      - ./backend-pym/src/app/public:/app/src/app/public
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

  nginx:
    build:
      context: .
      dockerfile: nginx.dockerfile
    container_name: pym_web
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Configuración de nginx
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
      # Certificados SSL
      - ./ssl/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - ./ssl/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
      # NO montes ./dist/pwa porque ya está en el builder
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      - app
      - postgres
    networks:
      - pym
    environment:
      - TZ=America/La_Paz

  postgres:
    image: postgres:15.5
    container_name: pym_db
    restart: always
    environment:
      - POSTGRES_USER=pym_user
      - POSTGRES_DB=db_pymsystems
      - POSTGRES_PASSWORD=fzZf9DdAZi
      - TZ=America/La_Paz
    ports:
      - "5555:5432"
    volumes:
      - ./schemas:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - pym

networks:
  pym:
    driver: bridge