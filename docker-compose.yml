services:
  app:
    build:
      context: .
      dockerfile: backend.dockerfile
    container_name: pym_node
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    networks:
      - pym
    # 🔥 DNS EXPLÍCITO - Resuelve nombres de dominio externos
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
      - 1.0.0.1
    # 🔥 CAPACIDADES DE RED
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # 🔥 HOSTS EXTERNOS (opcional, si conoces IPs específicas)
    #extra_hosts:
     # - "smtp.privateemail.com:199.xxx.xxx.xxx"  # Comenta si no sabes la IP
    environment:
      - TZ=America/La_Paz
      - PORT=5000
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=pym_user
      - DB_PASSWORD=fzZf9DdAZi
      - DB_NAME=db_pymsystems
      # 🔧 VARIABLES PARA NODE Y EMAIL
      - NODE_TLS_REJECT_UNAUTHORIZED=0  # Solo para pruebas (quitar en producción)
      - EMAIL_HOST=smtp.privateemail.com
      - EMAIL_PORT=465
      - EMAIL_SECURE=true
      - EMAIL_USER=pedrozam@pymsystems.com
      - EMAIL_PASSWORD=tu_contraseña_aqui
    volumes:
      - ./backend-pym/app/public:/app/app/public
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

  nginx:
    build:
      context: .
      dockerfile: nginx.dockerfile
    container_name: pym_web
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      - app
    networks:
      - pym
    environment:
      - TZ=America/La_Paz
    # 🔥 DNS para nginx también (por si necesita resolver dominios)
    dns:
      - 8.8.8.8
      - 8.8.4.4

  postgres:
    image: postgres:15.5
    container_name: pym_db
    restart: always
    environment:
      - POSTGRES_USER=pym_user
      - POSTGRES_DB=db_pymsystems
      - POSTGRES_PASSWORD=fzZf9DdAZi
      - TZ=America/La_Paz
    ports:
      - "5555:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - pym
    # 🔥 DNS para postgres también
    dns:
      - 8.8.8.8
      - 8.8.4.4

volumes:
  postgres_data:

networks:
  pym:
    driver: bridge
    # 🔧 CONFIGURACIÓN AVANZADA DE RED
    driver_opts:
      com.docker.network.bridge.name: br-pym
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.bridge.enable_icc: "true"
    ipam:
      config:
        - subnet: 172.20.0.0/16