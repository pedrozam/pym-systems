# /ruta/a/tu/proyecto/nginx/frontend.conf

# Redirección HTTP -> HTTPS
server {
    listen 80;
    server_name www.pymsystems.com pymsystems.com;
    return 301 https://$server_name$request_uri;
}

# Servidor HTTPS
server {
    listen 443 ssl http2;
    server_name www.pymsystems.com pymsystems.com;
    
    client_max_body_size 5M;

    # Rutas a los certificados (ahora apuntan a los enlaces simbólicos)
    ssl_certificate     /etc/letsencrypt/live/pymsystems.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pymsystems.com/privkey.pem;
    
    # Configuración SSL recomendada
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ @rewrites;
    }

    location @rewrites {
        rewrite ^(.+)$ /index.html last;
    }

    # Backend API
    location /backend/ {
        proxy_pass http://app:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}