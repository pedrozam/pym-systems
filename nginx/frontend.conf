# /nginx/frontend.conf

# Redirección HTTP -> HTTPS
server {
    listen 80;
    server_name www.pymsystems.com pymsystems.com;
    return 301 https://$server_name$request_uri;
}

# Servidor HTTPS
server {
    listen 443 ssl http2;
    server_name www.pymsystems.com pymsystems.com;
    
    client_max_body_size 5M;

    # Rutas a los certificados
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    
    # Configuración SSL recomendada
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Headers de seguridad para PWA
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Header crítico para Service Worker
    add_header Service-Worker-Allowed "/" always;

    # Frontend - Configuración optimizada para PWA
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # Intentar archivos estáticos primero, luego redirigir a index.html
        try_files $uri $uri/ /index.html;
        
        # Cache para archivos estáticos (excepto service worker y manifest)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Configuración especial para Service Worker (NO debe cachearse)
    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header Service-Worker-Allowed "/" always;
        add_header Content-Type "application/javascript";
        try_files $uri =404;
    }

    # Configuración para el manifest.json
    location = /manifest.json {
        add_header Cache-Control "no-cache";
        add_header Content-Type "application/manifest+json";
        add_header Service-Worker-Allowed "/" always;
        try_files $uri =404;
    }

    # Configuración para assets de PWA (iconos, screenshots)
    location ~ ^/(icons|screenshots)/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Backend API
    location /backend/ {
        proxy_pass http://app:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}