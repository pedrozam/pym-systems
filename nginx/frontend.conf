# /nginx/frontend.conf

# Redirección HTTP -> HTTPS
server {
    listen 80;
    server_name www.pymsystems.com pymsystems.com;
    return 301 https://$server_name$request_uri;
}

# Servidor HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name www.pymsystems.com pymsystems.com;
    
    client_max_body_size 5M;

    # Rutas a los certificados
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    
    # Configuración SSL recomendada
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Headers de seguridad para PWA
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Header crítico para Service Worker
    add_header Service-Worker-Allowed "/" always;

    # Configuración especial para manifest.json
    location = /manifest.json {
        root /usr/share/nginx/html;
        add_header Content-Type "application/manifest+json" always;
        add_header Cache-Control "public, max-age=604800" always;
        try_files $uri =404;
    }

    # Configuración especial para Service Worker (NO debe cachearse)
    location = /service-worker.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Service-Worker-Allowed "/" always;
        add_header Content-Type "application/javascript" always;
        try_files $uri =404;
    }

    # Configuración para assets de PWA (iconos, screenshots)
    location ~ ^/(icons|screenshots)/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache para archivos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Frontend - Configuración optimizada para PWA (debe ser lo último)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /backend/ {
        proxy_pass http://app:5000/;
        
        # Headers del proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Configuración de proxy para WebSocket y Keep-Alive
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        
        # TIMEOUTS
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        # Manejo de preflight requests (OPTIONS) - retornar 204
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
}